<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>POS</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f5e6d8;
}

.topbar{
background:#6b4b3a;
color:white;
display:flex;
justify-content:space-between;
padding:10px;
}

button{
cursor:pointer;
border:none;
border-radius:8px;
padding:8px;
}

.menuTop button{
margin:2px;
background:#d9a066;
}

.logout{
background:red;
color:white;
}

.page{
display:none;
padding:10px;
}

.active{
display:block;
}

.card{
background:white;
padding:15px;
margin:10px;
display:inline-block;
border-radius:10px;
}

.big{
font-size:25px;
color:#cc7a00;
}

.menu button{
font-size:18px;
margin:5px;
background:#ffe0c2;
}

.order{
background:white;
padding:10px;
margin-top:10px;
}

</style>

</head>
<body>


<script>

if(!localStorage.getItem("staff")){
location.href="index.html"
}

</script>


<div class="topbar">

<div class="menuTop">

<button onclick="page('home')">หน้าแรก</button>
<button onclick="page('pos')">POS</button>
<button onclick="page('history')">ค้าง</button>
<button onclick="page('done')">ย้อนหลัง</button>

</div>

<div>

<span id="staff"></span>

<button
class="logout"
onclick="logout()"
title="Logout">
⎋
</button>

</div>

</div>



<div id="home" class="page active">

<h2>Dashboard</h2>

<div class="card">
ออเดอร์ค้าง
<div id="count" class="big">0</div>
</div>

<div class="card">
เงินวันนี้
<div id="money" class="big">0</div>
</div>

<button onclick="resetDone()">
ล้างย้อนหลัง
</button>

</div>



<div id="pos" class="page">

<h2>POS</h2>

<input id="customer"
placeholder="ชื่อลูกค้า">

<select id="type">
<option>ทานที่ร้าน</option>
<option>กลับบ้าน</option>
</select>

<br>

<button onclick="add('Coffee',50)">Coffee</button>
<button onclick="add('Cake',70)">Cake</button>
<button onclick="add('Tea',40)">Tea</button>

<div id="list" class="order"></div>

<div id="total"></div>

<button onclick="sendOrder()">
ส่ง
</button>

<button onclick="cancelOrder()">
ยกเลิก
</button>

</div>



<div id="history" class="page">

<h2>ค้าง</h2>

<div id="historyBox"></div>

</div>



<div id="done" class="page">

<h2>ย้อนหลัง</h2>

<div id="doneBox"></div>

</div>



<script>


document.getElementById("staff")
.innerText=
localStorage.getItem("staff")


let order={}
let history=
JSON.parse(localStorage.getItem("history"))||[]
let doneHistory=
JSON.parse(localStorage.getItem("done"))||[]


function page(p){

document
.querySelectorAll(".page")
.forEach(e=>e.classList.remove("active"))

document
.getElementById(p)
.classList.add("active")

updateDash()
showHistory()
showDone()

}


function logout(){

localStorage.removeItem("staff")

location.href="index.html"

}


function add(m,p){

if(order[m]){
order[m].qty++
}else{
order[m]={qty:1,price:p}
}

show()

}


function show(){

let text=""
let total=0

for(let m in order){

let q=order[m].qty

text+=m+" x"+q+"<br>"

total+=q*order[m].price

}

list.innerHTML=text
totalDiv.innerText="รวม "+total

}


function cancelOrder(){

order={}
show()

}


function sendOrder(){

let total=0

for(let m in order){

total+=
order[m].qty*
order[m].price

}

history.push({
text:JSON.stringify(order),
total:total
})

localStorage.setItem(
"history",
JSON.stringify(history)
)

order={}
show()

updateDash()

}


function finish(i){

doneHistory.push(history[i])

history.splice(i,1)

localStorage.setItem(
"history",
JSON.stringify(history))

localStorage.setItem(
"done",
JSON.stringify(doneHistory))

showHistory()
showDone()
updateDash()

}


function showHistory(){

let t=""

history.forEach((h,i)=>{

t+=
h.text+
` <button onclick="finish(${i})">เสร็จ</button><hr>`

})

historyBox.innerHTML=t

}


function showDone(){

let t=""

doneHistory.forEach(h=>{

t+=h.text+"<hr>"

})

doneBox.innerHTML=t

}


function updateDash(){

let money=0

doneHistory.forEach(h=>{
money+=h.total
})

count.innerText=history.length
moneyDiv.innerText=money

}


function resetDone(){

doneHistory=[]
localStorage.setItem("done","[]")
showDone()
updateDash()

}


updateDash()
showHistory()
showDone()

</script>

</body>
</html>
