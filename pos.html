<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>POS</title>

<style>

<script>

document.getElementById("staff").innerText =
localStorage.getItem("staff")

let admin = localStorage.getItem("staff") === "admin"

let order={}
let history=JSON.parse(localStorage.getItem("history"))||[]
let doneHistory=JSON.parse(localStorage.getItem("done"))||[]

let menuList = JSON.parse(localStorage.getItem("menu")) || [
{name:"Coffee",price:50},
{name:"Cake",price:70},
{name:"Tea",price:40},
{name:"Milk",price:30},
{name:"Cookie",price:35},
{name:"Latte",price:60}
]

let table=""
let type=""
let today=new Date().toLocaleDateString()


// ===== render menu =====

function renderMenu(){

let box=document.querySelector(".menuGrid")
if(!box)return

box.innerHTML=""

menuList.forEach(m=>{

let b=document.createElement("button")

b.className="menuBtn"
b.innerText=m.name+" "+m.price

b.onclick=()=>add(m.name,m.price)

box.appendChild(b)

})

if(admin){

let addBtn=document.createElement("button")

addBtn.className="menuBtn"
addBtn.innerText="➕ เพิ่มเมนู"

addBtn.onclick=addMenu

box.appendChild(addBtn)

}

}


// ===== เพิ่มเมนู =====

function addMenu(){

let name=prompt("ชื่อเมนู")
if(!name)return

let price=Number(prompt("ราคา"))
if(!price)return

menuList.push({
name:name,
price:price
})

localStorage.setItem(
"menu",
JSON.stringify(menuList)
)

renderMenu()

}


// ===== table =====

let tb=document.getElementById("tableBox")

for(let i=1;i<=22;i++){

let b=document.createElement("button")

b.innerText="โต๊ะ "+i
b.className="tableBtn"

b.onclick=()=>selectTable(i,b)

tb.appendChild(b)

}


// ===== page =====

function page(p){

document.querySelectorAll(".page")
.forEach(e=>e.classList.remove("active"))

document.getElementById(p)
.classList.add("active")

updateDash()
showHistory()
showDone()

}


// ===== logout =====

function logout(){

localStorage.removeItem("staff")
location.href="index.html"

}


// ===== type =====

function setType(t,btn){

type=t

eatBtn.classList.remove("selected")
backBtn.classList.remove("selected")

btn.classList.add("selected")

if(t=="eat"){
tableBox.style.display="grid"
}else{
tableBox.style.display="none"
table=""
}

}


// ===== table select =====

function selectTable(i,btn){

let t="โต๊ะ "+i

if(table==t){

table=""
btn.classList.remove("tableSelect")
return

}

table=t

document.querySelectorAll(".tableBtn")
.forEach(b=>b.classList.remove("tableSelect"))

btn.classList.add("tableSelect")

}


// ===== add =====

function add(m,p){

if(order[m]){
order[m].qty++
}else{
order[m]={qty:1,price:p}
}

show()

}


// ===== minus =====

function minus(m){

order[m].qty--

if(order[m].qty<=0){
delete order[m]
}

show()

}


// ===== show =====

function show(){

let text=""
let total=0

for(let m in order){

let q=order[m].qty
let price=q*order[m].price

text+=
m+" x"+q+
" = "+price+
` <button onclick="minus('${m}')">-</button><br>`

total+=price

}

list.innerHTML=text

document.getElementById("total").innerText=
"รวม "+total+" บาท"

}


// ===== send =====

function sendOrder(){

let total=0

for(let m in order){
total+=order[m].qty*order[m].price
}

let now=new Date()

let data={

name:customer.value,
table:table,
items:JSON.stringify(order),
total:total,
date:now.toLocaleDateString(),
time:now.toLocaleTimeString()

}

history.push(data)

localStorage.setItem(
"history",
JSON.stringify(history)
)

order={}
show()

showHistory()

}


// ===== history =====

function showHistory(){

let t=""

history.forEach((h,i)=>{

let obj=JSON.parse(h.items)

let items=""

for(let m in obj){

items+=
m+" x"+obj[m].qty+
" = "+
(obj[m].qty*obj[m].price)+"<br>"

}

t+=

"<div class='order'>"+
"<b>"+h.name+" "+h.table+"</b><br>"+
h.date+" "+h.time+
"<hr>"+
items+
"<hr>"+
"<b>รวม "+h.total+" บาท</b><br>"+
`<button onclick="finish(${i})">เสร็จ</button>`+

(admin
?`<button onclick="delHistory(${i})">ลบ</button>`
:"")

+
"</div>"

})

historyBox.innerHTML=t

}


function delHistory(i){

if(!admin)return

history.splice(i,1)

localStorage.setItem(
"history",
JSON.stringify(history)
)

showHistory()

}


// ===== done =====

function showDone(){

let t=""

doneHistory.forEach((h,i)=>{

t+=
h.name+" "+h.table+
"<br>"+h.date+
"<br>"+h.time+
"<br>รวม "+h.total+
(admin
?` <button onclick="delDone(${i})">ลบ</button>`
:"")
+
"<hr>"

})

doneBox.innerHTML=t

}


function delDone(i){

if(!admin)return

doneHistory.splice(i,1)

localStorage.setItem(
"done",
JSON.stringify(doneHistory)
)

showDone()

}


// ===== finish =====

function finish(i){

doneHistory.push(history[i])
history.splice(i,1)

localStorage.setItem(
"history",
JSON.stringify(history)
)

localStorage.setItem(
"done",
JSON.stringify(doneHistory)
)

showHistory()
showDone()
updateDash()

}


// ===== dash =====

function updateDash(){

let sum=0

doneHistory.forEach(h=>{
if(h.date===today){
sum+=h.total
}
})

money.innerText=sum

}


renderMenu()
updateDash()
showHistory()
showDone()

//// ===== RECEIPT POPUP =====

function showReceipt(d){

let obj=JSON.parse(d.items)

let items=""

for(let m in obj){

items+=
m+" x"+obj[m].qty+
" = "+
(obj[m].qty*obj[m].price)+"<br>"

}

receipt.innerHTML=

"<h3>ใบเสร็จ</h3>"+
d.name+" "+d.table+
"<br>"+d.date+" "+d.time+
"<hr>"+
items+
"<hr>"+
"<b>รวม "+d.total+" บาท</b>"

receipt.style.display="block"

setTimeout(()=>{
receipt.style.display="none"
},3000)

}



//// ===== sendOrder upgrade =====

let oldSend = sendOrder

sendOrder = function(){

let total=0

for(let m in order){
total+=order[m].qty*order[m].price
}

let now=new Date()

let data={

name:customer.value,
table:table,
items:JSON.stringify(order),
total:total,
date:now.toLocaleDateString(),
time:now.toLocaleTimeString()

}

history.push(data)

localStorage.setItem(
"history",
JSON.stringify(history)
)

showReceipt(data)

order={}
show()

showHistory()

}



//// ===== ADMIN CLEAR TODAY =====

function clearToday(){

if(!admin)return

doneHistory=
doneHistory.filter(h=>h.date!==today)

localStorage.setItem(
"done",
JSON.stringify(doneHistory)
)

updateDash()
showDone()

}



//// ===== ADMIN RESET ALL =====

function resetAll(){

if(!admin)return

if(!confirm("ล้างทั้งหมด ?"))return

history=[]
doneHistory=[]
menuList=[]

localStorage.clear()

renderMenu()
showHistory()
showDone()
updateDash()

}



//// ===== ADMIN BUTTON =====

if(admin){

let btn=document.createElement("button")

btn.innerText="RESET"
btn.className="bigBtn"
btn.onclick=resetAll

document.getElementById("home")
.appendChild(btn)

}
  
</script>

</body>
</html>
