<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Redbrick Cafe</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f5e6d8;
color:#3b2b20;
}

/* TOP */

.topbar{
background:#6b4b3a;
color:white;
display:flex;
justify-content:space-between;
padding:10px;
}

.menuTop button{
background:#d9a066;
border:none;
padding:8px 12px;
margin:2px;
border-radius:8px;
cursor:pointer;
}

.staff{
font-weight:bold;
}

/* LOGO */

.logoBox{
text-align:center;
font-size:40px;
margin:10px;
}

/* PAGE */

.page{
display:none;
padding:15px;
}

.active{
display:block;
}

/* CARD */

.card{
background:white;
border-radius:12px;
padding:15px;
width:200px;
display:inline-block;
margin:10px;
text-align:center;
}

.big{
font-size:28px;
color:#cc7a00;
}

/* POS */

.box{
background:white;
padding:15px;
border-radius:12px;
max-width:900px;
margin:auto;
}

.menuGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.menuBtn{
background:#ffe0c2;
border:none;
border-radius:12px;
padding:10px;
font-size:18px;
cursor:pointer;
}

.order{
background:#f2e2d2;
padding:10px;
margin-top:10px;
}

.bigBtn{
background:#cc7a00;
border:none;
padding:10px;
margin-top:5px;
color:white;
border-radius:8px;
cursor:pointer;
}

/* receipt */

#receipt{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:10px;
display:none;
text-align:center;
}

</style>
</head>
<body>


<div class="topbar">

<div class="menuTop">

<button onclick="page('home')">หน้าแรก</button>
<button onclick="page('pos')">POS</button>
<button onclick="page('history')">ค้าง</button>
<button onclick="page('done')">ย้อนหลัง</button>

</div>

<div id="staff" class="staff"></div>

</div>



<!-- HOME -->

<div id="home" class="page active">

<div class="logoBox">
☕ Redbrick Cafe
</div>

<div class="card">
ออเดอร์ค้าง
<div id="count" class="big">0</div>
</div>

<div class="card">
เงินวันนี้
<div id="money" class="big">0</div>
</div>

<br>

<button class="bigBtn" onclick="resetDay()">
ล้างข้อมูลวันนี้
</button>

</div>



<!-- POS -->

<div id="pos" class="page">

<div class="logoBox">
☕ Redbrick Cafe
</div>

<div class="box">

<input id="customer" placeholder="ลูกค้า">

<select id="type" onchange="checkType()">
<option>ทานที่ร้าน</option>
<option>กลับบ้าน</option>
</select>

<select id="table">
<option>โต๊ะ1</option>
<option>โต๊ะ2</option>
<option>โต๊ะ3</option>
</select>


<div class="menuGrid">

<button class="menuBtn"
onclick="add('Coffee',50)">
☕ Coffee
</button>

<button class="menuBtn"
onclick="add('Latte',60)">
🥛 Latte
</button>

<button class="menuBtn"
onclick="add('Cake',70)">
🍰 Cake
</button>

<button class="menuBtn"
onclick="add('Tea',40)">
🍵 Tea
</button>

<button class="menuBtn"
onclick="add('Milk',30)">
🥛 Milk
</button>

<button class="menuBtn"
onclick="add('Cookie',35)">
🍪 Cookie
</button>

</div>


<div id="list" class="order"></div>

<div id="total"></div>

<button class="bigBtn"
onclick="sendOrder()">
ส่งออเดอร์
</button>

</div>

</div>



<!-- ค้าง -->

<div id="history" class="page">

<div class="logoBox">
📋 ออเดอร์ค้าง
</div>

<div id="historyBox"></div>

</div>



<!-- ย้อนหลัง -->

<div id="done" class="page">

<div class="logoBox">
📜 ประวัติย้อนหลัง
</div>

<div id="doneBox"></div>

</div>



<div id="receipt"></div>



<script>

let staff=localStorage.getItem("staff")
document.getElementById("staff").innerText=staff

let order={}
let history=
JSON.parse(localStorage.getItem("history"))||[]

let doneHistory=
JSON.parse(localStorage.getItem("done"))||[]



function page(p){

document.querySelectorAll(".page")
.forEach(e=>e.classList.remove("active"))

document.getElementById(p)
.classList.add("active")

updateDash()
showHistory()
showDone()

}



function checkType(){

let t=
document.getElementById("type").value

document.getElementById("table").style.display=
t=="ทานที่ร้าน"
?"inline"
:"none"

}



function add(m,p){

if(order[m]){
order[m].qty++
}else{
order[m]={qty:1,price:p}
}

show()

}



function show(){

let text=""
let total=0

for(let m in order){

let q=order[m].qty
let p=order[m].price

text+=m+" x"+q+"<br>"

total+=q*p

}

document.getElementById("list").innerHTML=text
document.getElementById("total").innerText="รวม "+total

}



function sendOrder(){

let name=
document.getElementById("customer").value

let type=
document.getElementById("type").value

let table=
document.getElementById("table").value

let total=0
let text=""

for(let m in order){

let q=order[m].qty
let p=order[m].price

text+=m+" x"+q+"\n"

total+=q*p

}

let full=
name+"\n"+
type+"\n"+
table+"\n"+
text+
"รวม "+total


history.push({
text:full,
total:total
})

localStorage.setItem(
"history",
JSON.stringify(history)
)

receipt(full)

order={}

show()

updateDash()
showHistory()

}



function finish(i){

doneHistory.push(history[i])

history.splice(i,1)

localStorage.setItem(
"history",
JSON.stringify(history))

localStorage.setItem(
"done",
JSON.stringify(doneHistory))

showHistory()
showDone()
updateDash()

}



function showHistory(){

let t=""

history.forEach((h,i)=>{

t+=
h.text+
` <button onclick="finish(${i})">เสร็จ</button><hr>`

})

document.getElementById("historyBox").innerHTML=t

}



function showDone(){

let t=""

doneHistory.forEach(h=>{

t+=h.text+"<hr>"

})

document.getElementById("doneBox").innerHTML=t

}



function updateDash(){

let money=0

history.forEach(h=>{
money+=h.total
})

document.getElementById("count").innerText=
history.length

document.getElementById("money").innerText=
money

}



function resetDay(){

history=[]
localStorage.setItem("history","[]")

updateDash()
showHistory()

}



function receipt(t){

let r=
document.getElementById("receipt")

r.style.display="block"

r.innerHTML=

`
☕ Redbrick Cafe
<hr>
${t}
<hr>
Thank you
`

setTimeout(()=>{
r.style.display="none"
},4000)

}



updateDash()
showHistory()
showDone()

</script>

</body>
</html>
