<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Redbrick System</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#1e1e1e;
color:white;
}

/* ===== TOP MENU ===== */

.topbar{

background:#111;
padding:10px;

display:flex;
justify-content:space-between;
align-items:center;

}

.menuTop button{

margin-right:5px;
padding:6px 10px;
border:none;
background:#333;
color:white;
cursor:pointer;

}

.menuTop button:hover{

background:#b30000;

}

.staff{

color:#00ffaa;

}

/* ===== PAGE ===== */

.page{

display:none;
padding:20px;

}

.active{

display:block;

}

/* ===== DASHBOARD ===== */

.card{

background:#2b2b2b;
padding:20px;
border-radius:10px;
margin:10px;
width:250px;
display:inline-block;

}

.big{

font-size:30px;

}

/* ===== POS ===== */

.box{

background:#2b2b2b;
padding:20px;
width:500px;
margin:auto;
border-radius:10px;

}

button{

padding:8px;
margin:4px;
border:none;
border-radius:6px;
cursor:pointer;

}

.menu button{

background:#444;
color:white;

}

.order{

background:#111;
padding:10px;
margin-top:10px;

}

.history{

background:#111;
padding:10px;

}

</style>

</head>
<body>


<!-- TOP -->

<div class="topbar">

<div class="menuTop">

<button onclick="showPage('home')">
หน้าแรก
</button>

<button onclick="showPage('pos')">
POS
</button>

<button onclick="showPage('history')">
ออเดอร์
</button>

</div>

<div class="staff" id="staffName"></div>

</div>



<!-- ================= HOME ================= -->

<div id="home" class="page active">

<h2>Dashboard</h2>

<div class="card">

ออเดอร์วันนี้

<div id="orderCount" class="big">
0
</div>

</div>


<div class="card">

รายได้วันนี้

<div id="money" class="big">
0
</div>

</div>

</div>



<!-- ================= POS ================= -->

<div id="pos" class="page">

<div class="box">

<input id="name" placeholder="ลูกค้า">

<select id="type">
<option>ทานที่ร้าน</option>
<option>กลับบ้าน</option>
</select>

<h3>MENU</h3>

<div class="menu">

<button onclick="add('Coffee',50)">Coffee</button>
<button onclick="add('Latte',60)">Latte</button>
<button onclick="add('Cake',70)">Cake</button>

</div>

<div id="list" class="order"></div>

<div id="total"></div>

<button onclick="sendOrder()">
ส่ง
</button>

</div>

</div>



<!-- ================= HISTORY ================= -->

<div id="history" class="page">

<h2>ออเดอร์ที่ส่งแล้ว</h2>

<div id="historyBox" class="history"></div>

</div>



<script>

let staff = localStorage.getItem("staff")
document.getElementById("staffName").innerText = staff

let order={}
let history = JSON.parse(localStorage.getItem("history")) || []


function showPage(p){

document.querySelectorAll(".page")
.forEach(e=>e.classList.remove("active"))

document.getElementById(p)
.classList.add("active")

updateDashboard()
showHistory()

}


function add(m,p){

if(order[m]){

order[m].qty++

}else{

order[m]={qty:1,price:p}

}

show()

}


function show(){

let text=""
let total=0

for(let m in order){

let q=order[m].qty
let p=order[m].price

text+=m+" x"+q+"\n"

total+=q*p

}

document.getElementById("list").innerText=text
document.getElementById("total").innerText="รวม "+total

}


function sendOrder(){

let total=0
let text=""

for(let m in order){

let q=order[m].qty
let p=order[m].price

text+=m+" x"+q+"\n"

total+=q*p

}

history.push({
text:text,
total:total
})

localStorage.setItem(
"history",
JSON.stringify(history)
)

order={}

show()

updateDashboard()
showHistory()

}


function showHistory(){

let t=""

history.forEach(h=>{

t+=h.text+" = "+h.total+"<hr>"

})

document.getElementById("historyBox").innerHTML=t

}


function updateDashboard(){

let money=0

history.forEach(h=>{

money+=h.total

})

document.getElementById("orderCount")
.innerText=history.length

document.getElementById("money")
.innerText=money

}


updateDashboard()
showHistory()

</script>

</body>
</html>
