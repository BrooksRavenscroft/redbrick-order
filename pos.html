<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Redbrick System</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#1e1e1e;
color:white;
}

/* TOP */

.topbar{
background:#111;
padding:10px;
display:flex;
justify-content:space-between;
}

.menuTop button{
margin:3px;
padding:6px;
background:#333;
color:white;
border:none;
}

.staff{
color:#00ffaa;
}

/* page */

.page{
display:none;
padding:20px;
}

.active{
display:block;
}

/* dashboard */

.card{
background:#2b2b2b;
padding:20px;
border-radius:10px;
width:200px;
display:inline-block;
margin:10px;
}

.big{
font-size:30px;
}

/* pos */

.box{
background:#2b2b2b;
padding:20px;
width:500px;
margin:auto;
}

.menu button{
margin:5px;
padding:8px;
}

.order{
background:#111;
padding:10px;
margin-top:10px;
}

/* receipt */

#receipt{

position:fixed;
top:50%;
left:50%;

transform:translate(-50%,-50%);

background:white;
color:black;

padding:20px;

display:none;

}

</style>

</head>
<body>


<div class="topbar">

<div class="menuTop">

<button onclick="showPage('home')">หน้าแรก</button>
<button onclick="showPage('pos')">POS</button>
<button onclick="showPage('history')">ออเดอร์</button>

</div>

<div id="staffName"></div>

</div>



<!-- HOME -->

<div id="home" class="page active">

<h2>Dashboard</h2>

<div class="card">
ออเดอร์วันนี้
<div id="orderCount" class="big">0</div>
</div>

<div class="card">
รายได้
<div id="money" class="big">0</div>
</div>

<br>

<button onclick="resetDay()">
ล้างข้อมูลวันนี้
</button>

</div>



<!-- POS -->

<div id="pos" class="page">

<div class="box">

<input id="customer" placeholder="ชื่อลูกค้า">

<select id="type" onchange="checkType()">
<option>ทานที่ร้าน</option>
<option>กลับบ้าน</option>
</select>

<select id="table">
<option>โต๊ะ1</option>
<option>โต๊ะ2</option>
<option>โต๊ะ3</option>
<option>โต๊ะ4</option>
</select>


<h3>MENU</h3>

<div class="menu">

<button onclick="add('Coffee',50)">Coffee</button>
<button onclick="add('Latte',60)">Latte</button>
<button onclick="add('Cake',70)">Cake</button>

</div>

<div id="list" class="order"></div>

<div id="total"></div>

<button onclick="sendOrder()">
ส่งออเดอร์
</button>

</div>

</div>



<!-- HISTORY -->

<div id="history" class="page">

<h2>รายการ</h2>

<div id="historyBox"></div>

</div>



<div id="receipt"></div>



<script>

const WEBHOOK = "ใส่ลิงค์"

let staff = localStorage.getItem("staff")
document.getElementById("staffName").innerText=staff

let order={}

let history =
JSON.parse(localStorage.getItem("history"))
|| []



function showPage(p){

document.querySelectorAll(".page")
.forEach(e=>e.classList.remove("active"))

document.getElementById(p)
.classList.add("active")

updateDash()
showHistory()

}


function checkType(){

let t =
document.getElementById("type").value

document.getElementById("table").style.display =
t=="ทานที่ร้าน"
? "inline"
: "none"

}


function add(m,p){

if(order[m]){

order[m].qty++

}else{

order[m]={qty:1,price:p}

}

show()

}


function show(){

let text=""
let total=0

for(let m in order){

let q=order[m].qty
let p=order[m].price

text+=m+" x"+q+"\n"

total+=q*p

}

document.getElementById("list").innerText=text
document.getElementById("total").innerText="รวม "+total

}


function sendOrder(){

let name =
document.getElementById("customer").value

let type =
document.getElementById("type").value

let table =
document.getElementById("table").value

let total=0
let text=""

for(let m in order){

let q=order[m].qty
let p=order[m].price

text+=m+" x"+q+"\n"

total+=q*p

}


let full =
name+"\n"+
type+"\n"+
table+"\n"+
text+
"รวม "+total


history.push({

text:full,
total:total

})

localStorage.setItem(
"history",
JSON.stringify(history)
)


showReceipt(full)

sendDiscord(full)

order={}

show()

updateDash()
showHistory()

}



function sendDiscord(msg){

fetch(WEBHOOK,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

content:msg

})

})

}


function showReceipt(t){

let r =
document.getElementById("receipt")

r.style.display="block"

r.innerText=t

setTimeout(()=>{

r.style.display="none"

},3000)

}



function showHistory(){

let t=""

history.forEach((h,i)=>{

t+=
h.text+
` <button onclick="finish(${i})">เสร็จ</button><hr>`

})

document.getElementById("historyBox").innerHTML=t

}



function finish(i){

history.splice(i,1)

localStorage.setItem(
"history",
JSON.stringify(history)
)

showHistory()
updateDash()

}



function updateDash(){

let money=0

history.forEach(h=>{
money+=h.total
})

document.getElementById("orderCount").innerText =
history.length

document.getElementById("money").innerText =
money

}



function resetDay(){

if(confirm("ล้างข้อมูลวันนี้?")){

history=[]

localStorage.removeItem("history")

updateDash()
showHistory()

}

}



updateDash()
showHistory()

</script>

</body>
</html>
