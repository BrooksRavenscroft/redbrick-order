<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>POS</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f5e6d8;
}

/* ---------- TOP ---------- */

.topbar{
background:#6b4b3a;
color:white;
display:flex;
justify-content:space-between;
padding:10px;
}

.menuTop button{
margin:2px;
padding:6px 10px;
border:none;
border-radius:8px;
background:#d9a066;
cursor:pointer;
}

.logout{
background:#c0392b;
color:white;
border:none;
border-radius:8px;
padding:6px 10px;
cursor:pointer;
}

/* ---------- PAGE ---------- */

.page{
display:none;
padding:10px;
}

.active{
display:block;
}

/* ---------- CENTER POS ---------- */

.centerBox{

max-width:900px;
margin:auto;
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 0 10px #0003;

}

/* ---------- INPUT ---------- */

.bigInput{

font-size:22px;
padding:8px;
margin:5px;
border-radius:8px;
width:95%;

}

.bigBtn{

font-size:20px;
padding:10px;
margin:5px;
border:none;
border-radius:10px;
background:#cc7a00;
color:white;
cursor:pointer;

}

/* ---------- TABLE ---------- */

#tableBox{

display:grid;
grid-template-columns:repeat(6,1fr);
gap:5px;
margin-top:10px;

}

.tableBtn{

padding:6px;
border:none;
border-radius:8px;
background:#bdc3c7;
cursor:pointer;

}

.tableFree{

background:#bdc3c7;

}

.tableUse{

background:#e67e22;
color:white;

}

.tableBusy{

background:#e74c3c;
color:white;

}

/* ---------- MENU ---------- */

.menuGrid{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:5px;
margin-top:10px;

}

.menuBtn{

font-size:18px;
padding:8px;
border:none;
border-radius:10px;
background:#ffe0c2;
cursor:pointer;

}

/* ---------- ORDER ---------- */

.order{

background:#f2e2d2;
padding:10px;
margin-top:10px;

}

/* ---------- DASH ---------- */

.card{

background:white;
padding:15px;
display:inline-block;
margin:10px;
border-radius:10px;

}

.big{

font-size:25px;
color:#cc7a00;

}

</style>

</head>
<body>

<script>

if(!localStorage.getItem("staff")){
location.href="index.html"
}

</script>


<div class="topbar">

<div class="menuTop">

<button onclick="page('home')">หน้าแรก</button>
<button onclick="page('pos')">POS</button>
<button onclick="page('history')">ค้าง</button>
<button onclick="page('done')">ย้อนหลัง</button>

</div>

<div>

<span id="staff"></span>

<button class="logout"
onclick="logout()"
title="Logout">
⎋
</button>

</div>

</div>


<!-- ================= HOME ================= -->

<div id="home" class="page active">

<h2>Dashboard</h2>

<div class="card">
ออเดอร์ค้าง
<div id="count" class="big">0</div>
</div>

<div class="card">
เงินวันนี้
<div id="money" class="big">0</div>
</div>

</div>



<!-- ================= POS ================= -->

<div id="pos" class="page">

<div class="centerBox">

<h2>POS</h2>

<input id="customer"
class="bigInput"
placeholder="ชื่อลูกค้า">

<br>

<button class="bigBtn"
onclick="setType('eat')">
🍽 ทานที่ร้าน
</button>

<button class="bigBtn"
onclick="setType('back')">
🥡 กลับบ้าน
</button>


<div id="tableBox"></div>


<div class="menuGrid">

<button class="menuBtn"
onclick="add('Coffee',50)">
☕ Coffee
</button>

<button class="menuBtn"
onclick="add('Latte',60)">
🥛 Latte
</button>

<button class="menuBtn"
onclick="add('Cake',70)">
🍰 Cake
</button>

<button class="menuBtn"
onclick="add('Tea',40)">
🍵 Tea
</button>

<button class="menuBtn"
onclick="add('Milk',30)">
🥛 Milk
</button>

<button class="menuBtn"
onclick="add('Cookie',35)">
🍪 Cookie
</button>

</div>


<div id="list" class="order"></div>

<div id="total"></div>

<button class="bigBtn"
onclick="sendOrder()">
ส่งออเดอร์
</button>

<button class="bigBtn"
onclick="cancelOrder()">
ยกเลิก
</button>

</div>

</div>



<!-- ================= HISTORY ================= -->

<div id="history" class="page">

<h2>ค้าง</h2>

<div id="historyBox"></div>

</div>



<!-- ================= DONE ================= -->

<div id="done" class="page">

<h2>ย้อนหลัง</h2>

<div id="doneBox"></div>

</div>



<script>


document.getElementById("staff")
.innerText=
localStorage.getItem("staff")


let order={}
let history=
JSON.parse(localStorage.getItem("history"))||[]
let doneHistory=
JSON.parse(localStorage.getItem("done"))||[]

let table=""
let type=""



/* ---------- TABLE CREATE ---------- */

let tableBox=document.getElementById("tableBox")

for(let i=1;i<=22;i++){

let b=document.createElement("button")

b.innerText="โต๊ะ "+i

b.className="tableBtn tableFree"

b.onclick=()=>setTable(i,b)

tableBox.appendChild(b)

}



/* ---------- PAGE ---------- */

function page(p){

document
.querySelectorAll(".page")
.forEach(e=>e.classList.remove("active"))

document
.getElementById(p)
.classList.add("active")

updateDash()
showHistory()
showDone()

}



/* ---------- LOGIN ---------- */

function logout(){

localStorage.removeItem("staff")

location.href="index.html"

}



/* ---------- TYPE ---------- */

function setType(t){

type=t

}



/* ---------- TABLE ---------- */

function setTable(i,btn){

table="โต๊ะ "+i

document
.querySelectorAll(".tableBtn")
.forEach(b=>b.classList.remove("tableUse"))

btn.classList.add("tableUse")

}



/* ---------- MENU ---------- */

function add(m,p){

if(order[m]){
order[m].qty++
}else{
order[m]={qty:1,price:p}
}

show()

}


function show(){

let text=""
let total=0

for(let m in order){

let q=order[m].qty

text+=m+" x"+q+"<br>"

total+=q*order[m].price

}

list.innerHTML=text

totalDiv.innerText="รวม "+total

}



/* ---------- CANCEL ---------- */

function cancelOrder(){

order={}
show()

}



/* ---------- SEND ---------- */

function sendOrder(){

let total=0

for(let m in order){

total+=
order[m].qty*
order[m].price

}

history.push({

text:
document.getElementById("customer").value+
" "+table,

total:total

})

localStorage.setItem(
"history",
JSON.stringify(history)
)

order={}
show()

updateDash()

}



/* ---------- HISTORY ---------- */

function finish(i){

doneHistory.push(history[i])

history.splice(i,1)

localStorage.setItem(
"history",
JSON.stringify(history))

localStorage.setItem(
"done",
JSON.stringify(doneHistory))

showHistory()
showDone()
updateDash()

}


function showHistory(){

let t=""

history.forEach((h,i)=>{

t+=
h.text+
` <button onclick="finish(${i})">เสร็จ</button><hr>`

})

historyBox.innerHTML=t

}



function showDone(){

let t=""

doneHistory.forEach(h=>{

t+=h.text+"<hr>"

})

doneBox.innerHTML=t

}



/* ---------- DASH ---------- */

function updateDash(){

let money=0

doneHistory.forEach(h=>{
money+=h.total
})

count.innerText=history.length
money.innerText=money

}


updateDash()
showHistory()
showDone()

</script>

</body>
</html>
