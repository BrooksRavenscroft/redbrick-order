<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login - Redbrick</title>

<style>

body{

margin:0;
font-family:Segoe UI;
background:#f5e6d8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;

}


.box{

background:white;
padding:30px;
border-radius:15px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.2);

}


.logo{

font-size:40px;
margin-bottom:10px;

}


.title{

font-size:20px;
margin-bottom:15px;

}


.btn{

display:block;
width:200px;
padding:12px;
margin:8px auto;
border:none;
border-radius:10px;
font-size:18px;
background:#cc7a00;
color:white;
cursor:pointer;

}


.btn:hover{

background:#a65f00;

}

</style>

</head>
<body>



<div class="box">

<div class="logo">
☕ Redbrick Cafe
</div>

<div class="title">
เลือกพนักงาน
</div>


<button class="btn"
onclick="login('Brooks')">

Brooks

</button>


<button class="btn"
onclick="login('Belial Blair')">

Belial Blair

</button>


</div>



<script>

function login(name){

localStorage.setItem(
"staff",
name
)

location.href="pos.html"

}

</script>


</body>
</html>
