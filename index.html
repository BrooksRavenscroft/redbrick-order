<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Redbrick POS</title>

<style>

body{
margin:0;
font-family:Arial;
background:#2b2b2b;
color:white;
text-align:center;
}

.box{
background:#3b3b3b;
width:480px;
margin:auto;
margin-top:20px;
padding:20px;
border-radius:10px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:5px;
cursor:pointer;
}

.menu button{
background:#444;
color:white;
}

.menu button:hover{
background:#b30000;
}

.send{background:green}
.cancel{background:red}
.logout{background:#555}

.order{
background:#111;
padding:10px;
margin-top:10px;
text-align:left;
white-space:pre-line;
}

.history{
background:#222;
padding:10px;
margin-top:10px;
text-align:left;
max-height:150px;
overflow:auto;
}

.total{
color:#00ffaa;
margin-top:5px;
}

</style>

</head>
<body>


<div id="login" class="box">

<h2>Redbrick Coffee Shop</h2>

<button onclick="login('Brooks')">Brooks</button>
<button onclick="login('Belial Blair')">Belial Blair</button>

</div>



<div id="orderPage" class="box" style="display:none;">

<h3 id="staffName"></h3>

<input id="name" placeholder="ลูกค้า">
<input id="table" placeholder="โต๊ะ">

<select id="type">
<option>ทานที่ร้าน</option>
<option>กลับบ้าน</option>
</select>

<h3>เมนู</h3>

<div class="menu">

<button onclick="add('Coffee',50)">Coffee</button>
<button onclick="add('Latte',60)">Latte</button>
<button onclick="add('Cake',70)">Cake</button>
<button onclick="add('Pasta',120)">Pasta</button>
<button onclick="add('Steak',250)">Steak</button>

</div>

<div id="list" class="order"></div>

<div id="total" class="total"></div>

<button onclick="sendOrder()" class="send">ส่ง</button>
<button onclick="cancelOrder()" class="cancel">ยกเลิก</button>
<button onclick="logout()" class="logout">Logout</button>

<h3>บันทึกออเดอร์</h3>

<div id="history" class="history"></div>

</div>



<script>

const WEBHOOK="ใส่ webhook"

let staff=""
let order={}
let history=[]

function login(name){

staff=name

document.getElementById("login").style.display="none"
document.getElementById("orderPage").style.display="block"

document.getElementById("staffName").innerText="พนักงาน: "+staff

}

function logout(){

staff=""
order={}

document.getElementById("orderPage").style.display="none"
document.getElementById("login").style.display="block"

show()

}

function add(menu,price){

if(order[menu]){

order[menu].qty++

}else{

order[menu]={qty:1,price:price}

}

show()

}

function remove(menu){

if(order[menu]){

order[menu].qty--

if(order[menu].qty<=0){

delete order[menu]

}

}

show()

}

function cancelOrder(){

order={}
show()

}

function show(){

let text=""
let total=0

for(let m in order){

let q=order[m].qty
let p=order[m].price

text+=m+" x"+q+" = "+(q*p)
text+="  (-)"
text+="\n"

total+=q*p

}

document.getElementById("list").innerText=text
document.getElementById("total").innerText="รวม "+total+" บาท"

}

async function sendOrder(){

const name=document.getElementById("name").value
const table=document.getElementById("table").value
const type=document.getElementById("type").value

let text=""
let total=0

for(let m in order){

let q=order[m].qty
let p=order[m].price

text+=m+" x"+q+" = "+(q*p)+"\n"

total+=q*p

}

await fetch(WEBHOOK,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
content:
`📦 ORDER
👨‍🍳 ${staff}
👤 ${name}
🪑 ${table}
📌 ${type}

${text}

รวม ${total}`
})
})

history.push(name+" "+total+" บาท")

showHistory()

order={}
show()

}

function showHistory(){

let text=""

for(let h of history){

text+=h+"\n"

}

document.getElementById("history").innerText=text

}

</script>

</body>
</html>
