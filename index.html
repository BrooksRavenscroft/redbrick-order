<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Redbrick System</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("https://images.unsplash.com/photo-1509042239860-f550ce710b93");
background-size:cover;
color:white;
text-align:center;
}

/* กล่อง */

.box{
background:rgba(0,0,0,0.7);
width:420px;
margin:auto;
margin-top:40px;
padding:20px;
border-radius:10px;
}

/* โลโก้ */

.logo{
font-size:30px;
color:#ff4444;
margin-bottom:10px;
}

/* ปุ่ม */

button{
padding:15px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.big{
width:90%;
background:#b30000;
color:white;
}

.big:hover{
background:red;
}

.menu button{
background:#444;
color:white;
width:120px;
}

.menu button:hover{
background:#b30000;
}

.send{
background:green;
width:90%;
}

.logout{
background:#555;
width:90%;
}

.order{
background:#111;
padding:10px;
margin-top:10px;
text-align:left;
white-space:pre-line;
}

input{
width:90%;
padding:10px;
margin:5px;
border:none;
border-radius:5px;
}

</style>

</head>
<body>


<!-- เสียง -->
<audio id="clickSound">
<source src="https://www.soundjay.com/buttons/sounds/button-16.mp3">
</audio>



<!-- LOGIN -->

<div id="login" class="box">

<div class="logo">Redbrick Coffee Shop</div>

<h3>เลือกพนักงาน</h3>

<button class="big" onclick="login('Brooks')">Brooks</button>
<button class="big" onclick="login('Belial Blair')">Belial Blair</button>

</div>



<!-- ORDER -->

<div id="orderPage" class="box" style="display:none;">

<div class="logo">Redbrick POS</div>

<p id="staffName"></p>

<input id="name" placeholder="ลูกค้า">
<input id="table" placeholder="โต๊ะ">

<h3>เมนู</h3>

<div class="menu">

<button onclick="add('Coffee')">Coffee</button>
<button onclick="add('Latte')">Latte</button>
<button onclick="add('Cake')">Cake</button>
<button onclick="add('Pasta')">Pasta</button>
<button onclick="add('Steak')">Steak</button>

</div>

<h3>รายการ</h3>

<div id="list" class="order"></div>

<button class="send" onclick="sendOrder()">ส่งออเดอร์</button>

<button class="logout" onclick="logout()">Logout</button>

</div>



<script>

const WEBHOOK="ใส่ webhook ตรงนี้"

let staff=""
let order={}

function sound(){
document.getElementById("clickSound").play()
}

function login(name){

sound()

staff=name

document.getElementById("login").style.display="none"
document.getElementById("orderPage").style.display="block"

document.getElementById("staffName").innerText="พนักงาน: "+staff

}

function logout(){

sound()

staff=""
order={}

document.getElementById("orderPage").style.display="none"
document.getElementById("login").style.display="block"

show()

}

function add(menu){

sound()

if(order[menu]){
order[menu]++
}else{
order[menu]=1
}

show()

}

function show(){

let text=""

for(let m in order){

text+=m+" x"+order[m]+"\n"

}

document.getElementById("list").innerText=text

}

async function sendOrder(){

sound()

const name=document.getElementById("name").value
const table=document.getElementById("table").value

let text=""

for(let m in order){

text+=m+" x"+order[m]+"\n"

}

await fetch(WEBHOOK,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
content:
`📦 ORDER
👨‍🍳 ${staff}
👤 ${name}
🪑 ${table}

${text}`
})
})

order={}
show()

alert("ส่งแล้ว")

}

</script>

</body>
</html>
