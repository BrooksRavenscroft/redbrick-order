<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Redbrick Coffee Shop</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:url("https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb");
background-size:cover;
background-position:center;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

/* กล่อง login */

.loginBox{

background:rgba(20,20,20,0.85);
padding:30px;
border-radius:15px;
text-align:center;
width:350px;

box-shadow:0 0 25px black;

}

/* โลโก้ */

.logoImg{
width:220px;
margin-bottom:10px;
}

/* ชื่อร้าน */

.title{
font-size:26px;
color:#ff4444;
margin-bottom:10px;
}

/* ปุ่ม */

button{

width:100%;
padding:12px;
margin-top:10px;

font-size:16px;

border:none;
border-radius:8px;

background:#b30000;
color:white;

cursor:pointer;

transition:0.2s;

}

button:hover{

background:#ff3333;
transform:scale(1.05);

}

</style>

</head>
<body>


<div class="loginBox">

<img src="logo.png" class="logoImg">

<div class="title">
Redbrick Coffee Shop
</div>

<p>เลือกพนักงาน</p>

<button onclick="login('Brooks')">
Brooks
</button>

<button onclick="login('Belial Blair')">
Belial Blair
</button>

</div>



<script>

function login(name){

localStorage.setItem("staff",name)

window.location="pos.html"

}

</script>

</body>
</html>
