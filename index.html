<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Redbrick Order Panel</title>

<style>

body{
    background:#2b2b2b;
    font-family:Arial;
    color:white;
    text-align:center;
}

.box{
    background:#3b3b3b;
    width:350px;
    margin:auto;
    margin-top:50px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px black;
}

h2{
    color:#ff4d4d;
}

input,select{
    width:90%;
    padding:8px;
    margin:5px;
    border-radius:5px;
    border:none;
}

button{
    background:#b30000;
    color:white;
    padding:10px;
    width:95%;
    border:none;
    border-radius:5px;
    margin-top:10px;
    cursor:pointer;
}

button:hover{
    background:red;
}

</style>

</head>
<body>

<div class="box">

<h2>Redbrick Coffee Shop</h2>

<input id="staff" placeholder="พนักงาน">

<input id="name" placeholder="ลูกค้า">

<input id="table" placeholder="โต๊ะ">

<select id="menu">
<option>Coffee</option>
<option>Latte</option>
<option>Steak</option>
<option>Pasta</option>
<option>Cake</option>
</select>

<button onclick="sendOrder()">ส่งออเดอร์</button>

</div>

<script>

const WEBHOOK = "ใส่ webhook ตรงนี้"

async function sendOrder(){

const staff = document.getElementById("staff").value
const name = document.getElementById("name").value
const menu = document.getElementById("menu").value
const table = document.getElementById("table").value

await fetch(WEBHOOK,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
content:
`📦 ORDER
👨‍🍳 ${staff}
👤 ${name}
🍽 ${menu}
🪑 ${table}`
})
})

alert("ส่งแล้ว")

}

</script>

</body>
</html>
