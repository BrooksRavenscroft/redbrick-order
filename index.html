<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Redbrick POS</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("https://images.unsplash.com/photo-1509042239860-f550ce710b93");
background-size:cover;
color:white;
text-align:center;
}

.box{
background:rgba(0,0,0,0.7);
width:450px;
margin:auto;
margin-top:30px;
padding:20px;
border-radius:10px;
}

.logo{
font-size:28px;
color:#ff4444;
}

button{
padding:12px;
margin:5px;
border:none;
border-radius:6px;
cursor:pointer;
}

.big{
width:90%;
background:#b30000;
color:white;
}

.menu button{
background:#444;
color:white;
width:120px;
}

.menu button:hover{
background:#b30000;
}

.send{background:green;width:90%}
.cancel{background:red;width:90%}
.logout{background:#555;width:90%}

.order{
background:#111;
padding:10px;
margin-top:10px;
text-align:left;
white-space:pre-line;
}

input{
width:90%;
padding:10px;
margin:5px;
border:none;
border-radius:5px;
}

.total{
font-size:18px;
margin-top:10px;
color:#00ffcc;
}

</style>

</head>
<body>

<audio id="clickSound">
<source src="https://www.soundjay.com/buttons/sounds/button-16.mp3">
</audio>


<!-- LOGIN -->

<div id="login" class="box">

<div class="logo">Redbrick Coffee Shop</div>

<h3>เลือกพนักงาน</h3>

<button class="big" onclick="login('Brooks')">Brooks</button>
<button class="big" onclick="login('Belial Blair')">Belial Blair</button>

</div>


<!-- ORDER -->

<div id="orderPage" class="box" style="display:none;">

<div class="logo">Redbrick POS</div>

<p id="staffName"></p>

<input id="name" placeholder="ลูกค้า">
<input id="table" placeholder="โต๊ะ">

<h3>เมนู</h3>

<div class="menu">

<button onclick="add('Coffee',50)">Coffee 50</button>
<button onclick="add('Latte',60)">Latte 60</button>
<button onclick="add('Cake',70)">Cake 70</button>
<button onclick="add('Pasta',120)">Pasta 120</button>
<button onclick="add('Steak',250)">Steak 250</button>

</div>

<h3>รายการ</h3>

<div id="list" class="order"></div>

<div id="total" class="total"></div>

<button class="send" onclick="sendOrder()">ส่งออเดอร์</button>
<button class="cancel" onclick="cancelOrder()">ยกเลิกออเดอร์</button>
<button class="logout" onclick="logout()">Logout</button>

</div>



<script>

const WEBHOOK="ใส่ webhook"

let staff=""
let order={}

function sound(){
document.getElementById("clickSound").play()
}

function login(name){

sound()

staff=name

document.getElementById("login").style.display="none"
document.getElementById("orderPage").style.display="block"

document.getElementById("staffName").innerText="พนักงาน: "+staff

}

function logout(){

sound()

order={}
staff=""

document.getElementById("orderPage").style.display="none"
document.getElementById("login").style.display="block"

show()

}

function add(menu,price){

sound()

if(order[menu]){

order[menu].qty++
}else{

order[menu]={qty:1,price:price}

}

show()

}

function remove(menu){

sound()

if(order[menu]){

order[menu].qty--

if(order[menu].qty<=0){

delete order[menu]

}

}

show()

}

function cancelOrder(){

sound()

order={}

show()

}

function show(){

let text=""
let total=0

for(let m in order){

let q=order[m].qty
let p=order[m].price

text+=m+" x"+q+" = "+(q*p)+"\n"

total+=q*p

}

document.getElementById("list").innerText=text
document.getElementById("total").innerText="รวม "+total+" บาท"

}

async function sendOrder(){

sound()

const name=document.getElementById("name").value
const table=document.getElementById("table").value

let text=""
let total=0

for(let m in order){

let q=order[m].qty
let p=order[m].price

text+=m+" x"+q+" = "+(q*p)+"\n"

total+=q*p

}

await fetch(WEBHOOK,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
content:
`📦 ORDER
👨‍🍳 ${staff}
👤 ${name}
🪑 ${table}

${text}

รวม ${total} บาท`
})
})

order={}
show()

}

</script>

</body>
</html>
