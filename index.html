<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Redbrick System</title>

<style>

body{
background:#2b2b2b;
font-family:Arial;
color:white;
text-align:center;
}

.box{
background:#3b3b3b;
width:420px;
margin:auto;
margin-top:40px;
padding:20px;
border-radius:10px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:5px;
cursor:pointer;
}

.menu button{
background:#b30000;
color:white;
}

.send{
background:green;
color:white;
width:90%;
}

.login button{
background:#444;
color:white;
width:90%;
}

.order{
background:#222;
padding:10px;
margin-top:10px;
text-align:left;
white-space:pre-line;
}

input{
width:90%;
padding:8px;
margin:5px;
border-radius:5px;
border:none;
}

</style>

</head>
<body>


<!-- LOGIN PAGE -->

<div id="login" class="box">

<h2>Redbrick Coffee Shop</h2>

<h3>เลือกพนักงาน</h3>

<div class="login">

<button onclick="login('Arthur')">Arthur</button>
<button onclick="login('Olivia')">Olivia</button>
<button onclick="login('Lucas')">Lucas</button>
<button onclick="login('Emma')">Emma</button>

</div>

</div>



<!-- ORDER PAGE -->

<div id="orderPage" class="box" style="display:none;">

<h2>Redbrick Order Panel</h2>

<p id="staffName"></p>

<input id="name" placeholder="ลูกค้า">
<input id="table" placeholder="โต๊ะ">

<h3>เมนู</h3>

<div class="menu">

<button onclick="add('Coffee')">Coffee</button>
<button onclick="add('Latte')">Latte</button>
<button onclick="add('Cake')">Cake</button>
<button onclick="add('Pasta')">Pasta</button>
<button onclick="add('Steak')">Steak</button>

</div>

<h3>รายการ</h3>

<div id="list" class="order"></div>

<button class="send" onclick="sendOrder()">ส่งออเดอร์</button>

</div>



<script>

const WEBHOOK = "ใส่ webhook ตรงนี้"

let staff=""
let order={}


function login(name){

staff=name

document.getElementById("login").style.display="none"
document.getElementById("orderPage").style.display="block"

document.getElementById("staffName").innerText="พนักงาน: "+staff

}


function add(menu){

if(order[menu]){
order[menu]++
}else{
order[menu]=1
}

show()

}


function show(){

let text=""

for(let m in order){

text += m + " x" + order[m] + "\n"

}

document.getElementById("list").innerText=text

}


async function sendOrder(){

const name=document.getElementById("name").value
const table=document.getElementById("table").value

let text=""

for(let m in order){

text += m + " x" + order[m] + "\n"

}

await fetch(WEBHOOK,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
content:
`📦 ORDER
👨‍🍳 ${staff}
👤 ${name}
🪑 ${table}

${text}`
})
})

order={}
show()

alert("ส่งแล้ว")

}

</script>

</body>
</html>
