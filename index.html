<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Redbrick Order Panel</title>

<style>

body{
background:#2b2b2b;
font-family:Arial;
color:white;
text-align:center;
}

.box{
background:#3b3b3b;
width:420px;
margin:auto;
margin-top:30px;
padding:20px;
border-radius:10px;
}

input{
width:90%;
padding:8px;
margin:5px;
border-radius:5px;
border:none;
}

.menu button{
margin:5px;
padding:10px;
background:#b30000;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.menu button:hover{
background:red;
}

.order{
background:#222;
padding:10px;
margin-top:10px;
border-radius:5px;
text-align:left;
}

.send{
margin-top:10px;
padding:10px;
width:95%;
background:green;
color:white;
border:none;
border-radius:5px;
}

</style>

</head>
<body>

<div class="box">

<h2>Redbrick Coffee Shop</h2>

<input id="staff" placeholder="พนักงาน">
<input id="name" placeholder="ลูกค้า">
<input id="table" placeholder="โต๊ะ">

<h3>เมนู</h3>

<div class="menu">

<button onclick="add('Coffee')">Coffee</button>
<button onclick="add('Latte')">Latte</button>
<button onclick="add('Cake')">Cake</button>
<button onclick="add('Pasta')">Pasta</button>
<button onclick="add('Steak')">Steak</button>

</div>

<h3>รายการ</h3>

<div id="list" class="order"></div>

<button class="send" onclick="sendOrder()">ส่งออเดอร์</button>

</div>

<script>

const WEBHOOK = "ใส่ webhook ตรงนี้"

let order = {}

function add(menu){

if(order[menu]){
order[menu]++
}else{
order[menu]=1
}

show()

}

function show(){

let text=""

for(let m in order){

text += m + " x" + order[m] + "\n"

}

document.getElementById("list").innerText=text

}

async function sendOrder(){

const staff=document.getElementById("staff").value
const name=document.getElementById("name").value
const table=document.getElementById("table").value

let text=""

for(let m in order){

text += m + " x" + order[m] + "\n"

}

await fetch(WEBHOOK,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
content:
`📦 ORDER
👨‍🍳 ${staff}
👤 ${name}
🪑 ${table}

${text}`
})
})

order={}
show()

alert("ส่งแล้ว")

}

</script>

</body>
</html>
